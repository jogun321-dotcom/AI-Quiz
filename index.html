<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; margin: 0; }
        .quiz-container { max-width: 680px; margin: 30px auto; background: transparent; }
        .quiz-header { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; margin-bottom: 25px; border-top: 6px solid #3182ce; }
        h1 { color: #2c3e50; margin: 0 0 10px 0; font-size: 28px; }
        .subtitle { color: #7f8c8d; margin: 0; font-size: 14px; }
        
        /* 카드형 박스 스타일 */
        .quiz-item { background: white; margin-bottom: 25px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; transition: all 0.2s ease-in-out; }
        .quiz-item:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(49, 130, 206, 0.1); border-color: #bee3f8; }
        .question { font-size: 17px; font-weight: bold; margin-bottom: 18px; line-height: 1.6; color: #2d3436; display: flex; align-items: baseline; flex-wrap: wrap; }
        .score { color: #e74c3c; font-size: 13px; font-weight: normal; margin-left: 8px; background: #fff5f5; padding: 2px 6px; border-radius: 4px; border: 1px solid #fed7d7; }
        
        /* 퀴즈 이미지 스타일 */
        .quiz-image { display: block; max-width: 100%; max-height: 250px; margin: 15px 0; border-radius: 6px; border: 1px solid #e2e8f0; background-color: #fafafa; }
        
        /* 객관식 보기 스타일 */
        .options { list-style: none; padding: 0; margin: 0; }
        .options li { margin-bottom: 10px; }
        .options label { display: block; padding: 12px 15px; background: #f8f9fa; border: 1px solid #edf2f7; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-size: 15px; }
        .options label:hover { background: #ebf8ff; border-color: #90cdf4; color: #2b6cb0; }
        .options input[type="radio"] { margin-right: 12px; transform: scale(1.15); vertical-align: middle; }
        
        /* 주관식 입력창 스타일 */
        .text-answer { width: 100%; max-width: 450px; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; box-sizing: border-box; transition: all 0.2s; background: #fdfdfd; }
        .text-answer:focus { border-color: #3182ce; background: white; outline: none; box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15); }
        .hint { font-size: 12px; color: #4a5568; margin-top: 8px; display: block; background: #edf2f7; padding: 6px 10px; border-radius: 6px; width: fit-content; }
        
        /* 버튼 및 결과창 */
        .btn-submit { display: block; width: 100%; padding: 18px; background: #3182ce; color: white; border: none; border-radius: 12px; font-size: 19px; font-weight: bold; cursor: pointer; margin-top: 35px; box-shadow: 0 4px 6px rgba(49, 130, 206, 0.2); transition: all 0.2s; }
        .btn-submit:hover { background: #2b6cb0; transform: translateY(-1px); }
        .result { margin-top: 25px; padding: 25px; border-radius: 12px; text-align: center; font-size: 24px; font-weight: bold; display: none; line-height: 1.6; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .success { background-color: #c6f6d5; color: #22543d; border: 2px solid #38a169; }
        .fail { background-color: #fed7d7; color: #742a2a; border: 2px solid #e53e3e; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="quiz-header">
        <h1>📝 종합 평가 테스트</h1>
        <div class="subtitle">모든 문제를 풀고 최하단의 제출하기 버튼을 누르세요.</div>
    </div>
    
    <form id="quizForm">
        <div id="quiz-box"></div>
        <button type="button" class="btn-submit" onclick="checkAnswers()">정답 제출하기</button>
    </form>

    <div id="resultBox" class="result"></div>
</div>

<script>
const quizData = [
    {
        type: "text",
        question: "어느 지도에서 2cm는 실제 거리로는 4KM가 된다. 지도상에서 5cm는 실제 거리로 얼마인가?",
        hint: "💡 답변예시 : OOKM (대문자 입력 및 띄어쓰기 없이 숫자와 단위만 입력)",
        answer: "10KM"
    },
    {
        type: "text",
        question: "조립(어셈블리)를 영어로 쓰시오.",
        hint: "💡 영문 소문자로만 입력하세요. (띄어쓰기 없음)",
        answer: "assembly"
    },
    {
        type: "choice",
        question: "15 ( ) (9-6) + 4 x 3 = 17 에서 괄호 안에 들어갈 적절한 기호는?",
        options: ["+", "-", "÷", "x"],
        answer: 2
    },
    {
        type: "choice",
        question: "짝지어진 두 단어의 관계가 다른 것을 고르시오.",
        options: ["Strong – Weak", "Huge – Tiny", "Blank – Fix", "Slow – Fast"],
        answer: 2
    },
    {
        type: "text",
        question: "정리하다(어레인지)를 영어로 쓰시오.",
        hint: "💡 영문 소문자로만 입력하세요. (띄어쓰기 없음)",
        answer: "arrange"
    },
    {
        type: "text",
        question: "다음 수직선 그래프를 보고 연산 결과를 구하시오.",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Number_line.svg/640px-Number_line.svg.png",
        hint: "💡 숫자만 입력하세요.",
        answer: "10"
    },
    {
        type: "text",
        question: "73.862 + 33.529 - 325.793 을 계산하시오.",
        hint: "💡 마이너스 부호와 소수점을 정확히 입력하세요. ", // 7번 예시 변경 완료!
        answer: "-218.402"
    },
    {
        type: "text",
        question: "전기(일렉트릭)을 영어로 쓰시오.",
        hint: "💡 영문 소문자로만 입력하세요. (띄어쓰기 없음)",
        answer: "electric"
    },
    {
        type: "text",
        question: "4 x 27 - 3 x 2 ÷ 3 을 계산하시오.",
        hint: "💡 숫자만 입력하세요.",
        answer: "106"
    },
    {
        type: "text",
        question: "품질(퀄리티)를 영어로 쓰시오.",
        hint: "💡 영문 소문자로만 입력하세요. (띄어쓰기 없음)",
        answer: "quality"
    },
    {
        type: "choice",
        question: "대화의 빈칸에 들어갈 말로 알맞은 것을 고르시오.<br><br>A : I went fishing in the East Sea<br>B : Really? ____________?<br>A : It was so much fun!",
        options: ["How was it", "Where was it", "When did you go", "Who went with you"],
        answer: 1
    },
    {
        type: "choice",
        question: "수빈이와 어머니의 나이차는 32이다. 그리고 어머니의 나이는 수빈이의 나이의 3배라면 현재 수빈이의 나이는?",
        options: ["13", "18", "14", "16"],
        answer: 3
    },
    {
        type: "text",
        question: "오류(에러)를 영어로 쓰시오.",
        hint: "💡 영문 소문자로만 입력하세요. (띄어쓰기 없음)",
        answer: "error"
    },
    {
        type: "choice",
        question: "다음 중 제시된 단어와 같거나 비슷한 뜻을 가진 것을 고르시오.<br><br><b>region</b>",
        options: ["area", "surface", "situation", "union"],
        answer: 0
    },
    {
        type: "text",
        question: "12 - 4 x 8 + 32 ÷ 4 를 계산하시오.",
        hint: "💡 숫자만 입력하세요.",
        answer: "-12"
    },
    {
        type: "text",
        question: "생산(프로덕션)을 영어로 쓰시오.",
        hint: "💡 영문 소문자로만 입력하세요. (띄어쓰기 없음)",
        answer: "production"
    },
    {
        type: "text",
        question: "영수는 100M를 뛰는데 17초가 걸린다. 희원이는 50M를 뛰는데 11초가 걸린다. 둘이 각각 150M를 나누어 뛰었을 때(총 300M), 걸리는 시간은 총 몇 초인가?",
        hint: "💡 단위 없이 소수점을 포함한 숫자만 입력하세요.",
        answer: "58.5"
    },
    {
        type: "text",
        question: "[{20 - (4 x 3) x 4} ÷ 2] + 3 을 계산하시오.",
        hint: "💡 숫자만 입력하세요.",
        answer: "-11"
    },
    {
        type: "text",
        question: "기술(테크놀로지)를 영어로 쓰시오.",
        hint: "💡 영문 소문자로만 입력하세요. (띄어쓰기 없음)",
        answer: "technology"
    },
    {
        type: "choice",
        question: "다음 분수 그림이 나타내는 수식을 계산하고, 정답에 해당하는 보기를 고르시오.",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Fraction_one_half.svg/320px-Fraction_one_half.svg.png",
        options: ["1/2", "1/3", "1/4", "1/5"],
        answer: 0
    }
];

function renderQuiz() {
    const quizBox = document.getElementById('quiz-box');
    let html = '';

    quizData.forEach((q, index) => {
        html += `<div class="quiz-item">`;
        html += `<div class="question"><span>${index + 1}. ${q.question}</span> <span class="score">5점</span></div>`;

        if (q.image) {
            html += `<img src="${q.image}" class="quiz-image" alt="${index + 1}번 문제 이미지">`;
        }

        if (q.type === "choice") {
            html += `<ul class="options">`;
            q.options.forEach((opt, optIndex) => {
                html += `
                    <li>
                        <label>
                            <input type="radio" name="question${index}" value="${optIndex}">
                            ${optIndex + 1}번. ${opt}
                        </label>
                    </li>`;
            });
            html += `</ul>`;
        } else if (q.type === "text") {
            html += `<input type="text" name="question${index}" class="text-answer" placeholder="정답을 입력하세요">`;
            if (q.hint) {
                html += `<span class="hint">${q.hint}</span>`;
            }
        }

        html += `</div>`;
    });

    quizBox.innerHTML = html;
}

function checkAnswers() {
    let score = 0;
    const form = document.getElementById('quizForm');
    let unanswred = false;

    quizData.forEach((q, index) => {
        if (q.type === "choice") {
            const selected = form.querySelector(`input[name="question${index}"]:checked`);
            if (!selected) unanswred = true;
            if (selected && parseInt(selected.value) === q.answer) {
                score += 5;
            }
        } else if (q.type === "text") {
            const typed = form.querySelector(`input[name="question${index}"]`).value.trim();
            if (!typed) unanswred = true;
            if (typed.toLowerCase() === q.answer.toLowerCase()) {
                score += 5;
            }
        }
    });

    if (unanswred && !confirm("아직 풀지 않은 문제가 있습니다. 그대로 제출할까요?")) {
        return;
    }

    const resultBox = document.getElementById('resultBox');
    resultBox.style.display = "block";
    
    const totalQuestions = quizData.length * 5;
    if (score === totalQuestions) {
        resultBox.className = "result success";
        resultBox.innerHTML = `🎉 만점입니다! <br> 총점: ${score} / ${totalQuestions}점`;
    } else {
        resultBox.className = "result fail";
        resultBox.innerHTML = `👍 수고하셨습니다. <br> 총점: ${score} / ${totalQuestions}점`;
    }
    
    window.scrollTo({top: 0, behavior: 'smooth'});
}

renderQuiz();
</script>

</body>
</html>
